<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="100%" height="100%">
  <defs>
    <!-- Background Radial Shadows -->
    <radialGradient id="light-bg-glow" cx="15%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>

    <!-- Surfaces & Glass Gradients -->
    <linearGradient id="light-panel-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAFA" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#F4F4F5" stop-opacity="0.95" />
    </linearGradient>
    <linearGradient id="border-shimmer-light" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(15,23,42,0.03)" />
      <stop offset="50%" stop-color="rgba(15,23,42,0.15)" />
      <stop offset="100%" stop-color="rgba(15,23,42,0.03)" />
    </linearGradient>

    <!-- Text Gradients -->
    <linearGradient id="light-ascii-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111111" />
      <stop offset="50%" stop-color="#52525B" />
      <stop offset="100%" stop-color="#71717A" />
      <animate attributeName="y2" values="0.8; 1.2; 0.8" dur="8s" repeatCount="indefinite" />
    </linearGradient>
    <linearGradient id="light-accent-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111111" />
      <stop offset="50%" stop-color="#555555" />
      <stop offset="100%" stop-color="#71717A" />
      <animate attributeName="x1" values="0; 1; 0" dur="6s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Shadows & Filters -->
    <filter id="soft-shadow-light" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.06"/>
    </filter>

    <clipPath id="canvas-clip-light">
      <rect width="1180" height="610" rx="20" />
    </clipPath>
  </defs>

  <!-- Base Background -->
